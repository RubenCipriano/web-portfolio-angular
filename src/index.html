  <!-- Set theme before first paint to avoid a flash (FOUC). Runs only in the browser. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* keep the static default */ }
    })();
  </script>

  <!-- Fonts: load non-render-blocking. The preload flips to a stylesheet on
       load, so first paint never waits on the external font CSS. The build's
       critical-CSS step can't turn a <link rel=preload> back into a blocker. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap">
  </noscript>

  <!-- Preload critical data to reduce critical path latency -->
  <link rel="preload" href="/assets/data/experiences.json" as="fetch" crossorigin>
  <link rel="icon" type="image/x-icon" href="favicon.svg">

<body>

  <!--
    Hidden static form so Netlify's build-time scanner registers the "contact" form.
    The live Angular form (contact-form component) posts to this same name.
  -->
