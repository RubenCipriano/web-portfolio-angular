[build]
  # The `application` builder does browser + SSR + prerender in one step,
  # producing matching bundle hashes. (The old multi-step command could
  # desync hashes and 404 the main bundle.)
  command = "npm run build"
  publish = "dist/portfolio-web/browser"

[context.production.environment]
  NETLIFY_USE_NETLIFY_ANGULAR_RUNTIME = "false"
