<div class="education-card text-white d-flex mb-4">
  <div class="icon-box me-3">
    <fa-icon [icon]="iconArray"></fa-icon>
  </div>

  <div class="flex-grow-1">
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
      <div>
        <span class="type-badge" [class.is-cert]="isCertification">{{ typeLabel }}</span>
        <h5 class="fw-bold mb-1 mt-2">{{ item.qualification }}</h5>
      </div>
      <span class="dates text-secondary-white">{{ item.startDate }} – {{ item.endDate }}</span>
    </div>
    <h6 class="fw-semibold mb-2">
      {{ item.institution }}<span *ngIf="item.location" class="text-secondary-white"> · {{ item.location }}</span>
    </h6>
    <p *ngIf="item.description" class="text-secondary-white mb-2">{{ item.description }}</p>
    <a
      *ngIf="item.credentialUrl"
      class="credential-link"
      [href]="item.credentialUrl"
      target="_blank"
      rel="noopener">
      <fa-icon [icon]="['fas', isCertification ? 'certificate' : 'graduation-cap']" class="me-1"></fa-icon>
      {{ credentialLabel }}
    </a>
  </div>
</div>
